<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap');
      
      .gradient-bg {
        fill: url(#gradient1);
      }
      
      .text-primary {
        font-family: 'Space Grotesk', sans-serif;
        fill: #E8E8E8;
      }
      
      .text-cyan {
        font-family: 'Space Grotesk', sans-serif;
        fill: #00f2ff;
      }
      
      .text-purple {
        font-family: 'Space Grotesk', sans-serif;
        fill: #bc13fe;
      }
      
      .text-mono {
        font-family: 'Space Mono', monospace;
        fill: #999999;
      }
      
      .elephant-icon {
        fill: #ffffff;
      }
      
      .accent-circle {
        fill: #00f2ff;
        opacity: 0.15;
      }
      
      .dot-grid {
        fill: none;
        stroke: #333333;
        stroke-width: 1;
      }
    </style>
    
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" class="gradient-bg" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" class="accent-circle" />
  <circle cx="1100" cy="530" r="150" fill="#bc13fe" opacity="0.1" />
  
  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dotGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#333333" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dotGrid)" opacity="0.5"/>
  
  <!-- Left side - Logo and brand -->
  <g transform="translate(150, 200)">
    <!-- Elephant icon -->
    <svg width="120" height="120" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50.4 78.5a75.1 75.1 0 0 0-28.5 6.9l24.2-65.7c.7-2 1.9-3.2 3.4-3.2h29c1.5 0 2.7 1.2 3.4 3.2l24.2 65.7s-11.6-7-28.5-7L67 45.5c-.4-1.7-1.6-2.8-2.9-2.8-1.3 0-2.5 1.1-2.9 2.7L50.4 78.5Zm-1.1 28.2Zm-4.2-20.2c-2 6.6-.6 15.8 4.2 20.2a17.5 17.5 0 0 1 .2-.7 5.5 5.5 0 0 1 5.7-4.5c2.8.1 4.3 1.5 4.7 4.7.2 1.1.2 2.3.2 3.5v.4c0 2.7.7 5.2 2.2 7.4a13 13 0 0 0 5.7 4.9v-.3l-.2-.3c-1.8-5.6-.5-9.5 4.4-12.8l1.5-1a73 73 0 0 0 3.2-2.2 16 16 0 0 0 6.8-11.4c.3-2 .1-4-.6-6l-.8.6-1.6 1a37 37 0 0 1-22.4 2.7c-5-.7-9.7-2-13.2-6.2Z" class="elephant-icon"/>
      <style>
        @media (prefers-color-scheme: dark) {
          .elephant-icon { fill: #ffffff; }
        }
      </style>
    </svg>
    
    <!-- Brand name -->
    <text x="140" y="65" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" fill="#ffffff">engram</text>
  </g>
  
  <!-- Right side - Tagline and description -->
  <g transform="translate(450, 250)">
    <!-- Main tagline -->
    <text x="0" y="0" font-family="'Space Grotesk', sans-serif" font-size="48" font-weight="600" fill="#ffffff">
      <tspan x="0" dy="0">Persistent Memory</tspan>
      <tspan x="0" dy="48" class="text-cyan">for AI Coding Agents</tspan>
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="100" font-family="'Space Mono', monospace" font-size="24" fill="#999999" letter-spacing="0.04em">
      AGENT-AGNOSTIC • SINGLE BINARY • ZERO DEPENDENCIES
    </text>
    
    <!-- Feature badges -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="200" height="44" rx="8" fill="#000000" stroke="#222222" stroke-width="1"/>
      <text x="20" y="28" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#00f2ff" font-weight="600">🧠 MEMORY</text>
      
      <rect x="220" y="0" width="200" height="44" rx="8" fill="#000000" stroke="#222222" stroke-width="1"/>
      <text x="240" y="28" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#bc13fe" font-weight="600">🤖 AGENTS</text>
      
      <rect x="440" y="0" width="200" height="44" rx="8" fill="#000000" stroke="#222222" stroke-width="1"/>
      <text x="460" y="28" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#ffffff" font-weight="600">⚡ FAST</text>
    </g>
  </g>
  
  <!-- Bottom right - CTA -->
  <g transform="translate(900, 480)">
    <rect x="0" y="0" width="220" height="50" rx="25" fill="#00f2ff"/>
    <text x="110" y="32" font-family="'Space Mono', monospace" font-size="18" fill="#000000" font-weight="700" text-anchor="middle" letter-spacing="0.06em">GET STARTED</text>
  </g>
  
  <!-- Bottom left - Social proof -->
  <g transform="translate(100, 490)">
    <text x="0" y="0" font-family="'Space Mono', monospace" font-size="14" fill="#666666" letter-spacing="0.04em">
      GITHUB • DOCS • DISCORD
    </text>
  </g>
</svg>
